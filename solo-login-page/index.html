</head>

                </svg>
            </div>
            <h4 class="buddy-header">Hey Buddy</h4>
            <h1 class="welcome-header">Welcome to Pinterest</h1>
        </header>

        <form action="">
            <label for="email">Email </label>
            <input type="email" id="email" name="email">

            <label for="password">Password</label>
            <input type="password" id="password" name="password">

            <div class="forgot-password">Forgot your password?</div>

            <button>Log in</button>
        </form>

        <div class="separator-text">
            OR
        </div>

        <div class="bottom-logo">
            <div class="facebook-logo">
                <svg xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 640 640"><!--!Font Awesome Free 7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.-->
                    <path fill="currentcolor"
                        d="M576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320C64 440 146.7 540.8 258.2 568.5L258.2 398.2L205.4 398.2L205.4 320L258.2 320L258.2 286.3C258.2 199.2 297.6 158.8 383.2 158.8C399.4 158.8 427.4 162 438.9 165.2L438.9 236C432.9 235.4 422.4 235 409.3 235C367.3 235 351.1 250.9 351.1 292.2L351.1 320L434.7 320L420.3 398.2L351 398.2L351 574.1C477.8 558.8 576 450.9 576 320z" />
                </svg>
            </div>

            <div class="google-logo">
                <img src="images/download.png" alt="google-logo" width="45px">
            </div>
        </div>
        <footer>
            <div class="footer-text">
                By continuing, you agree to Pintreest's <a href="" class="link-text">Terms of Service</a> and
                acknowledge you've <div>read our
                <a href="" class="link-text">Privacy Policy</a></div>
            </div>
            <hr>
            <div class="last-text">
                Not on Pinterest yet? <a href="" class="link-text">Sign Up</a>
            </div>

        </footer>
    </section>
</body>

</html>
